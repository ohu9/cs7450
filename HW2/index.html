<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Homework 2</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div>
            <div id="chart-container">
                <h1>Atlanta Weather Data (2020-2022)</h1>
                <select id="chart-select">
                    <option value="barchart">Average Windspeed</option>
                    <option value="scatterplot">Max Temp vs. Dewpoint</option>
                    <option value="linechart">Temperature Trends</option>
                    <option value="heatmap" selected>Calendar Heatmap</option>
                </select>
                <div id="barchart"></div>
                <div id="scatterplot"></div>
                <div id="linechart"></div>
                <div id="heatmap"></div>
            </div>
        </div>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script type="module" src="scripts/script.js"></script>
        <script type="module" src="scripts/barchart.js"></script>
        <script type="module" src="scripts/scatterplot.js"></script>
        <script type="module" src="scripts/linechart.js"></script>
        <script type="module" src="scripts/heatmap.js"></script>
    </body>
</html>
