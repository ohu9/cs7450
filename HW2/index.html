<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Homework 2</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div>
            <div id="chart-container">
                <h1>Atlanta Weather Data (2020-2022)</h1>
                <select id="chart-select">
                    <option value="barchart">Average Windspeed</option>
                    <option value="scatterplot">Max Temp vs. Dewpoint</option>
                    <option value="linechart">Station Installation Trends</option>
                    <option value="piechart" selected>Operator Market Share</option>
                </select>
                <div id="barchart"></div>
                <div id="scatterplot"></div>
                <div id="linechart"></div>
                <div id="piechart"></div>
            </div>
        </div>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script type="module" src="scripts/script.js"></script>
        <script type="module" src="scripts/barchart.js"></script>
        <script type="module" src="scripts/scatterplot.js"></script>
        <script type="module" src="scripts/linechart.js"></script>
        <script type="module" src="scripts/piechart.js"></script>
        <script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    </body>
</html>
